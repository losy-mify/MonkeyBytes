name: MonkeyBytes 自动化

on:
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨1点 UTC 执行
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/MonkeyBytes-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/monkeybytes.py monkeybytes.py

      - name: 🐍 安装依赖
        run: pip install requests

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🤖 执行自动化脚本
        id: run_script
        env:
          MONKEY_ACCOUNT: ${{ secrets.MONKEY_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: python monkeybytes.py

      - name: 📤 推回私库（Cookie 有更新时）
        if: steps.run_script.outputs.cookie_updated == 'true'
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          cp monkeybytes.py private/monkeybytes.py
          cd private
          if ! git diff --quiet; then
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add monkeybytes.py
            git commit -m "🍪 自动更新 remember_web Cookie"
            git push "https://${PRIVATE_REPO_TOKEN}@github.com/${{ github.repository_owner }}/MonkeyBytes-Private.git" HEAD
            echo "✅ Cookie 已推回私库"
          else
            echo "ℹ️ Cookie 无变化，无需推送"
          fi
